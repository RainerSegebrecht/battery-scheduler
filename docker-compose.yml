services:
  battery-scheduler:
    build: .
    container_name: battery-scheduler
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
    volumes:
      # Read-only config — place your config.yaml here
      - ./config:/config:ro
      # Persistent SQLite database
      - battery-scheduler-data:/data
    # If evcc runs in the same Docker network, use its service name as URL.
    # Otherwise set evcc.url in config.yaml to the host IP / hostname.
    networks:
      - evcc_network

volumes:
  battery-scheduler-data:

networks:
  # Use the same network as evcc so the container can reach it by service name.
  # If evcc uses a different network name, adjust accordingly.
  evcc_network:
    external: true
