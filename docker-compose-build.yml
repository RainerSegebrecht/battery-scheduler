services:
  battery-scheduler:
    build: .
    container_name: battery-scheduler
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
    ports:
      # Web status UI — http://localhost:8080
      # Port kann in config.yaml unter web.port geändert werden.
      - "8080:8080"
    volumes:
      # Read-only config — place your config.yaml here
      - ./config:/config:ro
      # Persistent SQLite database
      - battery-scheduler-data:/data
    networks:
      - evcc_network

volumes:
  battery-scheduler-data:

networks:
  # Shared network with evcc. If evcc runs in a separate Compose project,
  # set external: true and adjust the name to match that project's network.
  # To find the name: docker network ls
  evcc_network:
    driver: bridge
